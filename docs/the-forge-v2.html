// Path markings between zones (glowing strips on ground)
function createPath(from, to, color) {
  const dir = new THREE.Vector3(to.x - from.x, 0, to.z - from.z);
  const len = dir.length();
  dir.normalize();
  const segments = Math.floor(len / 1.5);
  const mat = new THREE.MeshStandardMaterial({
    color, emissive: color, emissiveIntensity: 0.4,
    roughness: 0.5, metalness: 0.5
  });
  for (let i = 0; i < segments; i++) {
    const t = i / segments;
    const m = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.04, 0.8), mat);
    m.position.set(
      from.x + dir.x * len * t,
      0.03,
      from.z + dir.z * len * t
    );
    m.lookAt(new THREE.Vector3(to.x, 0.03, to.z));
    scene.add(m);
  }
}

function buildSkillTree() {
  const g = new THREE.Group();
  g.position.set(-22, 0, 0);

  const trunkMat = new THREE.MeshStandardMaterial({
    color: 0x44aa88, emissive: 0x44aa88, emissiveIntensity: 0.2, roughness: 0.4, metalness: 0.7
  });
  const nodeMat = new THREE.MeshStandardMaterial({
    color: 0x66ccaa, emissive: 0x44aa88, emissiveIntensity: 0.7, roughness: 0.3, metalness: 0.6
  });

  // Main trunk
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.35, 6, 8), trunkMat);
  trunk.position.y = 3; trunk.castShadow = true; g.add(trunk);

  // Platform base
  const platform = new THREE.Mesh(new THREE.CylinderGeometry(4, 4.5, 0.3, 16),
    new THREE.MeshStandardMaterial({ color: 0x1a2a22, roughness: 0.5, metalness: 0.7 }));
  platform.position.y = 0.15; g.add(platform);

  // Skill category branches
  const categories = [
    { name: 'Frontend', angle: 0, height: 5.5, skills: SKILL_DATA.frontend, color: 0x44dd88 },
    { name: 'Backend', angle: 2.1, height: 4.8, skills: SKILL_DATA.backend, color: 0x4488dd },
    { name: 'DevOps', angle: 4.2, height: 4.2, skills: SKILL_DATA.devops, color: 0xdd8844 }
  ];

  categories.forEach((cat, ci) => {
    const bx = Math.cos(cat.angle) * 2;
    const bz = Math.sin(cat.angle) * 2;

    // Branch line
    const branch = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.1, 3, 4), trunkMat);
    branch.position.set(bx * 0.5, cat.height - 1, bz * 0.5);
    branch.lookAt(new THREE.Vector3(0, 3, 0));
    branch.rotateX(Math.PI / 2);
    g.add(branch);

    // Category node (interactable)
    const catNode = new THREE.Mesh(new THREE.IcosahedronGeometry(0.4, 1),
      new THREE.MeshStandardMaterial({
        color: cat.color, emissive: cat.color, emissiveIntensity: 0.8, roughness: 0.3, metalness: 0.6
      }));
    catNode.position.set(bx, cat.height, bz);
    catNode.userData = {
      interactable: true,
      type: 'skill-category',
      name: cat.name,
      skills: cat.skills,
      baseY: cat.height,
      phase: ci * 1.5
    };
    g.add(catNode);
    interactables.push(catNode);

    // Sub-nodes for individual skills
    cat.skills.forEach((skill, si) => {
      const subAngle = cat.angle + (si - cat.skills.length / 2) * 0.4;
      const subR = 3 + si * 0.3;
      const sx = Math.cos(subAngle) * subR;
      const sz = Math.sin(subAngle) * subR;
      const sy = cat.height - 0.5 + si * 0.3;

      const subNode = new THREE.Mesh(new THREE.IcosahedronGeometry(0.12 + skill.level * 0.03, 0),
        new THREE.MeshStandardMaterial({
          color: cat.color, emissive: cat.color,
          emissiveIntensity: 0.3 + skill.level * 0.12, roughness: 0.3, metalness: 0.5
        }));
      subNode.position.set(sx, sy, sz);
      subNode.userData = { baseY: sy, phase: si * 0.8 + ci * 2 };
      g.add(subNode);

      // Connector
      const conn = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.015, 1.5, 3),
        new THREE.MeshStandardMaterial({ color: cat.color, emissive: cat.color, emissiveIntensity: 0.2, transparent: true, opacity: 0.4 }));
      conn.position.set((bx + sx) / 2, (cat.height + sy) / 2, (bz + sz) / 2);
      conn.lookAt(catNode.position);
      conn.rotateX(Math.PI / 2);
      g.add(conn);
    });
  });

  scene.add(g);
}
buildSkillTree();

function buildVault() {

  // Place projects in a spiral
  PROJECTS.forEach((proj, i) => {
    const angle = (i / PROJECTS.length) * Math.PI * 2 + 0.3;
    const radius = 3 + (i % 3) * 2.5;
    const px = Math.cos(angle) * radius;
    const pz = Math.sin(angle) * radius;

    // Pedestal
    const pedMat = new THREE.MeshStandardMaterial({ color: 0x2a1e14, roughness: 0.5, metalness: 0.8 });
    const ped = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.55, 1.5, 8), pedMat);

    const ring = new THREE.Mesh(new THREE.TorusGeometry(0.5, 0.03, 8, 24),
      new THREE.MeshStandardMaterial({ color: tierCol, emissive: tierCol, emissiveIntensity: 0.8 }));
    ring.rotation.x = -Math.PI / 2;
    ring.position.set(px, 1.62, pz); g.add(ring);

    // Artifact
    const artMat = new THREE.MeshStandardMaterial({
      color: proj.color, emissive: proj.color,
      emissiveIntensity: 0.7, roughness: 0.3, metalness: 0.7
    });
    let geo;
    switch (proj.shape) {
      case 'box': geo = new THREE.BoxGeometry(0.45, 0.45, 0.45); break;
      case 'ico': geo = new THREE.IcosahedronGeometry(0.32, 0); break;
      case 'octa': geo = new THREE.OctahedronGeometry(0.32, 0); break;
      case 'torus': geo = new THREE.TorusGeometry(0.28, 0.1, 8, 16); break;
      case 'cone': geo = new THREE.ConeGeometry(0.28, 0.5, 6); break;
      case 'sphere': geo = new THREE.SphereGeometry(0.3, 12, 12); break;
      default: geo = new THREE.BoxGeometry(0.4, 0.4, 0.4);

    const art = new THREE.Mesh(geo, artMat);
    art.position.set(px, 2.3, pz);
    art.userData = {
      interactable: true,
      type: 'project',
      project: proj,
      baseY: 2.3,
      phase: i * 0.7,
      worldGroup: g

    g.add(art);
    interactables.push(art);
  });

  scene.add(g);
}

function buildTimeline() {
  const g = new THREE.Group();
  g.position.set(0, 0, -24);

  // Path
  const pathMat = new THREE.MeshStandardMaterial({
    color: 0x6644aa, emissive: 0x6644aa, emissiveIntensity: 0.25, roughness: 0.5, metalness: 0.6
  });

  TIMELINE_DATA.forEach((era, i) => {
    const x = (i - 2) * 3.5;
    const z = Math.sin(i * 0.8) * 1.5;

    // Path segment
    if (i < TIMELINE_DATA.length - 1) {
      const nx = (i - 1) * 3.5;
      const nz = Math.sin((i + 1) * 0.8) * 1.5;
      const seg = new THREE.Mesh(new THREE.BoxGeometry(3.5, 0.06, 0.3), pathMat);
      seg.position.set((x + nx) / 2, 0.05, (z + nz) / 2);
      seg.lookAt(new THREE.Vector3(nx, 0.05, nz));
      g.add(seg);
    }

    // Era marker
    const mMat = new THREE.MeshStandardMaterial({
      color: era.color, emissive: era.color, emissiveIntensity: 0.9, roughness: 0.3, metalness: 0.5
    });
    const marker = new THREE.Mesh(new THREE.OctahedronGeometry(0.4, 0), mMat);

    marker.userData = {
      interactable: true,
      type: 'timeline-era',
      era,
      baseY: 2.2,
      phase: i * 1.2
    };
    g.add(marker);
    interactables.push(marker);

    // Vertical connector
    const conn = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 2, 4), pathMat);
    conn.position.set(x, 1.1, z); g.add(conn);

    // Ground circle

function createParticles(count, spread, yMax, color, size) {
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count * 3);
  const spd = new Float32Array(count);
  for (let i = 0; i < count; i++) {
    pos[i * 3] = (Math.random() - 0.5) * spread;
    pos[i * 3 + 1] = Math.random() * yMax;
    pos[i * 3 + 2] = (Math.random() - 0.5) * spread;
    spd[i] = Math.random() * 0.5 + 0.15;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const mat = new THREE.PointsMaterial({
    color, size, transparent: true, opacity: 0.7,
    blending: THREE.AdditiveBlending, depthWrite: false
  });
  const pts = new THREE.Points(geo, mat);
  pts.userData = { speeds: spd, yMax, spread };
  scene.add(pts);
  return pts;
}

// MINIMAP
// ============================================================
const mmCanvas = document.getElementById('minimap-canvas');
const mmCtx = mmCanvas.getContext('2d');

function drawMinimap() {
  mmCtx.fillStyle = 'rgba(10,8,6,0.9)';
  mmCtx.fillRect(0, 0, 140, 140);

  const scale = 2.2;
  const cx = 70, cy = 70;

  // Draw paths
  mmCtx.strokeStyle = 'rgba(196,129,58,0.2)';
  mmCtx.lineWidth = 1;
  Object.values(ZONE_DEFS).forEach(z => {
    if (z.center.x === 0 && z.center.z === 0) return;
    mmCtx.beginPath();
    mmCtx.moveTo(cx, cy);
    mmCtx.lineTo(cx + z.center.x * scale, cy + z.center.z * scale);
    mmCtx.stroke();
  });

  // Draw zones
  Object.entries(ZONE_DEFS).forEach(([key, z]) => {
    const x = cx + z.center.x * scale;
    const y = cy + z.center.z * scale;
    const isDiscovered = discovered.has(key);
    const isCurrent = currentZone === key;

    mmCtx.beginPath();
    mmCtx.arc(x, y, isCurrent ? 5 : 3, 0, Math.PI * 2);
    mmCtx.fillStyle = isCurrent ? '#e8a54b' : isDiscovered ? 'rgba(196,129,58,0.5)' : 'rgba(100,80,60,0.3)';
    mmCtx.fill();

    if (isCurrent) {
      mmCtx.beginPath();
      mmCtx.arc(x, y, 8, 0, Math.PI * 2);
      mmCtx.strokeStyle = 'rgba(232,165,75,0.3)';
      mmCtx.lineWidth = 1;
      mmCtx.stroke();
    }
  });

  // Player dot
  const px = cx + playerPos.x * scale;
  const py = cy + playerPos.z * scale;
  mmCtx.beginPath();
  mmCtx.arc(px, py, 3, 0, Math.PI * 2);
  mmCtx.fillStyle = '#f5deb3';
  mmCtx.fill();

  // Direction indicator
  const dirLen = 6;
  const dx = px - Math.sin(yaw) * dirLen;
  const dy = py - Math.cos(yaw) * dirLen;
  mmCtx.beginPath();
  mmCtx.moveTo(px, py);
  mmCtx.lineTo(dx, dy);
  mmCtx.strokeStyle = '#f5deb3';
  mmCtx.lineWidth = 1.5;
  mmCtx.stroke();
}

// ============================================================
// ZONE DETECTION
// ============================================================
function detectZone() {
  let closest = 'wilderness';
  let closestDist = Infinity;

  Object.entries(ZONE_DEFS).forEach(([key, z]) => {
    const dx = playerPos.x - z.center.x;
    const dz = playerPos.z - z.center.z;
    const dist = Math.sqrt(dx * dx + dz * dz);
    if (dist < z.radius && dist < closestDist) {
      closest = key;
      closestDist = dist;
    }
  });

  if (closest !== currentZone) {
    currentZone = closest;
    const indicator = document.getElementById('zone-indicator');

    if (ZONE_DEFS[closest]) {
      indicator.textContent = ZONE_DEFS[closest].name;
      indicator.classList.add('active');

      // Discovery tracking
      if (!discovered.has(closest)) {
        discovered.add(closest);
        document.getElementById('xp-fill').style.width = (discovered.size / 5 * 100) + '%';

        // Zone entrance flash
        const flash = document.getElementById('zone-flash');
        flash.textContent = ZONE_DEFS[closest].name;
        flash.classList.remove('show');
        void flash.offsetWidth;
        flash.classList.add('show');
      }

      // Quick nav update
      document.querySelectorAll('.qnav-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`.qnav-btn[data-zone="${closest}"]`)?.classList.add('active');
    } else {
      indicator.textContent = 'The Wilds';
      indicator.classList.remove('active');
      document.querySelectorAll('.qnav-btn').forEach(b => b.classList.remove('active'));
    }
  }
}

const raycaster = new THREE.Raycaster();
raycaster.far = 6;

function checkInteraction() {
  const dir = new THREE.Vector3(0, 0, -1);
  dir.applyQuaternion(camera.quaternion);
  raycaster.set(camera.position, dir);

  const hits = raycaster.intersectObjects(interactables, true);
  const prompt = document.getElementById('interact-prompt');
  const crosshair = document.getElementById('crosshair');

  if (hits.length > 0) {
    let obj = hits[0].object;
    while (obj && !obj.userData.interactable) obj = obj.parent;
    if (obj && obj.userData.interactable) {
      interactTarget = obj;
      let label = '';
      if (obj.userData.type === 'project') label = obj.userData.project.name;
      else if (obj.userData.type === 'skill-category') label = obj.userData.name;
      else if (obj.userData.type === 'timeline-era') label = obj.userData.era.era;
      else if (obj.userData.type === 'active-project') label = obj.userData.project.name;

      prompt.innerHTML = `<span class="key">E</span> Inspect ${label}`;
      prompt.classList.add('visible');
      crosshair.classList.add('visible');
      return;
    }
  }

  interactTarget = null;
  prompt.classList.remove('visible');
  crosshair.classList.remove('visible');
}

// ============================================================
// TELEPORT (quick nav)
// ============================================================
function teleportTo(zone) {
  if (!ZONE_DEFS[zone]) return;
  const z = ZONE_DEFS[zone];
  playerPos.set(z.center.x, 1.7, z.center.z + 6);
  yaw = Math.PI;
  closeDetail();
}

// ============================================================
// INPUT
// ============================================================
window.addEventListener('keydown', e => { keys[e.code] = true; });
window.addEventListener('keyup', e => {
  keys[e.code] = false;
  if (e.code === 'KeyE' && interactTarget) {
    showDetail(interactTarget.userData);
  }
  if (e.code === 'Escape') {
    closeDetail();
  }
});

document.addEventListener('pointerlockchange', () => {
  isLocked = document.pointerLockElement === renderer.domElement;
  document.getElementById('crosshair').classList.toggle('visible', isLocked);
});

renderer.domElement.addEventListener('mousemove', e => {
  if (!isLocked) return;
  yaw -= e.movementX * 0.002;
  pitch -= e.movementY * 0.002;
  pitch = Math.max(-1.2, Math.min(1.2, pitch));
});

renderer.domElement.addEventListener('click', () => {
  if (!isLocked) {
    renderer.domElement.requestPointerLock();
  } else if (interactTarget) {
    showDetail(interactTarget.userData);
  }
});

// Start overlay
document.getElementById('start-overlay').addEventListener('click', () => {
  document.getElementById('start-overlay').classList.add('hidden');
  renderer.domElement.requestPointerLock();
});

// ============================================================
// ANIMATION LOOP
// ============================================================
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  const dt = Math.min(clock.getDelta(), 0.05);

  // === PLAYER MOVEMENT ===
  const forward = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
  const right = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));

  if (keys['KeyW'] || keys['ArrowUp']) playerVel.add(forward.clone().multiplyScalar(SPEED * dt));
  if (keys['KeyS'] || keys['ArrowDown']) playerVel.add(forward.clone().multiplyScalar(-SPEED * dt));
  if (keys['KeyA'] || keys['ArrowLeft']) playerVel.add(right.clone().multiplyScalar(-SPEED * dt));
  if (keys['KeyD'] || keys['ArrowRight']) playerVel.add(right.clone().multiplyScalar(SPEED * dt));

  playerVel.multiplyScalar(FRICTION);
  playerPos.add(playerVel);
  playerPos.y = 1.7;

  // Clamp to world bounds
  playerPos.x = Math.max(-45, Math.min(45, playerPos.x));
  playerPos.z = Math.max(-45, Math.min(45, playerPos.z));

  camera.position.copy(playerPos);
  camera.rotation.order = 'YXZ';
  camera.rotation.y = yaw;
  camera.rotation.x = pitch;

  // === ZONE DETECTION ===
  detectZone();

  // === INTERACTION CHECK ===
  if (isLocked) checkInteraction();

  // === FIRE FLICKER ===
  fireLight.intensity = 3.5 + Math.sin(t * 8) * 0.6 + Math.sin(t * 13) * 0.35;
  fireLight.position.y = 2.5 + Math.sin(t * 3) * 0.1;

  // === ANIMATE EMBERS ===
  [embers, forgeEmbers].forEach(pts => {
    const pos = pts.geometry.getAttribute('position');
    for (let i = 0; i < pos.count; i++) {
      let y = pos.getY(i) + pts.userData.speeds[i] * 0.02;
      if (y > pts.userData.yMax) {
        y = 0;
        pos.setX(i, (Math.random() - 0.5) * pts.userData.spread);
        pos.setZ(i, (Math.random() - 0.5) * pts.userData.spread);
      }
      pos.setX(i, pos.getX(i) + Math.sin(t + i) * 0.002);
      pos.setY(i, y);
    }
    pos.needsUpdate = true;
  });

  // === ANIMATE INTERACTABLES ===
  interactables.forEach(obj => {
    if (obj.userData.baseY !== undefined) {
      obj.position.y = obj.userData.baseY + Math.sin(t * 1.3 + (obj.userData.phase || 0)) * 0.15;
    }
    if (obj.userData.spin || obj.userData.type === 'project') {
      obj.rotation.y = t * 0.7 + (obj.userData.phase || 0);
    }
    if (obj.userData.type === 'timeline-era') {
      obj.rotation.y = t * 0.5;
      obj.rotation.x = t * 0.3;
    }
    if (obj.userData.type === 'skill-category') {
      obj.rotation.y = t * 0.4 + (obj.userData.phase || 0);
    }

    // Glow brighter when player is close
    if (obj.userData.interactable && obj.material) {
      const worldPos = new THREE.Vector3();
      obj.getWorldPosition(worldPos);
      const dist = playerPos.distanceTo(worldPos);
      if (dist < 5) {
        obj.material.emissiveIntensity = 0.7 + (1 - dist / 5) * 1.3;
      }
    }
  });

  // === MINIMAP ===
  drawMinimap();

  renderer.render(scene, camera);
}

// ============================================================
// RESIZE
// ============================================================
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Start
animate();
</script>
